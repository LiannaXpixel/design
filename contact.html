<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - ShopLiannaX</title>

<meta name="description" content="Contact ShopLiannaX for support, collaborations, digital assets and customer questions.">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

html,
body{
    background:#0b0b0b;
    color:white;
    overflow-x:hidden;
}

body{
    min-height:100vh;
}

/* HERO BANNER */
.hero-banner{
    position:relative;
    width:100%;
    height:620px;
    overflow:hidden;
}

.hero-banner img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* MENU */
.main-menu{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:18px;
    padding:22px 15px;
    background:#111;
    border-top:1px solid #1d1d1d;
    border-bottom:1px solid #1d1d1d;
    flex-wrap:wrap;
}

.main-menu a{
    color:white;
    text-decoration:none;
    padding:12px 22px;
    border-radius:14px;
    background:#171717;
    border:1px solid #252525;
    transition:.3s;
    font-weight:bold;
}

.main-menu a:hover{
    background:#ff0077;
    border-color:#ff0077;
    transform:translateY(-2px);
}

/* CONTACT SECTION */
.contact-wrapper{
    width:100%;
    max-width:900px;
    margin:80px auto;
    padding:0 25px;
}

.contact-box{
    background:#151515;
    border:1px solid #252525;
    border-radius:26px;
    padding:50px;
    box-shadow:0 0 40px rgba(255,0,119,.08);
}

.contact-form{
    display:flex;
    flex-direction:column;
    gap:22px;
}

.contact-form input,
.contact-form textarea{
    width:100%;
    background:#0f0f0f;
    border:1px solid #2a2a2a;
    border-radius:16px;
    padding:18px;
    color:white;
    font-size:16px;
    transition:.3s;
}

.contact-form input:focus,
.contact-form textarea:focus{
    outline:none;
    border-color:#ff0077;
    box-shadow:0 0 15px rgba(255,0,119,.15);
}

.contact-form textarea{
    min-height:180px;
    resize:vertical;
}

.contact-form button{
    background:#ff0077;
    color:white;
    border:none;
    border-radius:16px;
    padding:18px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.contact-form button:hover{
    background:#ff3399;
    transform:translateY(-2px);
}

footer{
    text-align:center;
    padding:40px 20px;
    color:#777;
    border-top:1px solid #1e1e1e;
    margin-top:60px;
}

@media(max-width:768px){

.hero-banner{
    height:420px;
}

.contact-box{
    padding:35px 22px;
}

}
</style>
</head>

<body>

<!-- HERO BANNER -->
<div class="hero-banner">

    <img src="High quality asset image banner.png" alt="Banner">

</div>

<!-- MENU -->
<nav class="main-menu">

    <a href="index.html">Home</a>

    <a href="products-page1.html">Products</a>

    <a href="contact.html">Contact</a>

    <a href="faq.html">FAQ</a>

    <a href="policy.html">Policy</a>

    <a href="license.html">License</a>

</nav>

<!-- CONTACT -->
<section class="contact-wrapper">

    <div class="contact-box">

        <form class="contact-form" action="https://api.staticforms.xyz/submit" method="POST">

            <input type="hidden" name="accessKey" value="sf_73e47a82e9cb2b7ee36a9196">

            <input type="text" name="honeypot" style="display:none">

            <input type="text" name="name" placeholder="Your Name" required>

            <input type="email" name="email" placeholder="Your Email" required>

            <textarea name="message" placeholder="Write your message here..." required></textarea>

            <input type="hidden" name="replyTo" value="@">

            <input type="hidden" name="redirectTo" value="https://shopliannax.com/contact.html">

            <button type="submit">Send Message</button>

        </form>

    </div>

</section>

<footer>
    © 2026 ShopLiannaX - All Rights Reserved
</footer>

</body>
</html>
